description: >-
  Calpine Corporation was a major U.S. energy company headquartered in Houston,
  Texas, and was the largest generator of electricity from natural gas and
  geothermal energy in the United States. It operated 80 power plants with
  approximately 26,035 megawatts of generation capacity, including The Geysers,
  the world's largest geothermal complex. Calpine also operated the Champion
  Energy retail electricity subsidiary serving deregulated markets. As of
  January 2026, Constellation Energy completed its acquisition of Calpine for
  $16.4 billion, making it a business unit of Constellation. Calpine does not
  publish a public developer API program.
